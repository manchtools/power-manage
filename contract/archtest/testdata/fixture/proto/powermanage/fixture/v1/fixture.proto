// Liveness fixtures for the descriptor-walk guards: every shape here is a
// planted violation or a planted non-violation the guards_test rows pin.
syntax = "proto3";

package powermanage.fixture.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/manchtools/power-manage/contract/archtest/internal/fixturepb/powermanage/fixture/v1;fixturepb";

service FixtureService {
  rpc Do(FixtureRequest) returns (FixtureResponse);
}

message FixtureRequest {
  // G-1 must flag: reachable boundary field with no validate rules.
  string untagged_name = 1;
  // G-1 must not flag.
  string tagged_id = 2 [(buf.validate.field).string.len = 26];
  // Reachability hop: NestedParams joins the boundary through this field.
  NestedParams nested = 3 [(buf.validate.field).required = true];
  // Foreign well-known type: reachable through this (tagged) field, but its
  // internal fields are not contract surface — the closure must not walk
  // into messages defined outside the audited files.
  google.protobuf.Timestamp stamped_at = 4 [(buf.validate.field).required = true];
  // Reachability hop for the enum-bounds liveness shapes (tagged so the
  // G-1 want-set stays exactly two).
  FixtureEnumCarrier enum_carrier = 5 [(buf.validate.field).required = true];
}

message NestedParams {
  // G-1 must flag THROUGH the closure — a nested message is boundary too.
  string untagged_inner = 1;
}

message FixtureResponse {
  string tagged_out = 1 [(buf.validate.field).string.min_len = 1];
}

message UnreachableLoose {
  // Declared but not service-reachable: G-1 must NOT flag it.
  string never_flagged = 1;
}

// G-3 liveness: a fixture-local registry analog. Members double as G-4
// shapes: FixtureBoolParams plants the plain state-changing bool, its
// optional sibling plants the conforming form.
message FixtureActionParams {
  oneof params {
    FixtureAParams a = 1;
    FixtureBParams b = 2;
    FixtureBoolParams c = 3;
    FixtureOptBoolParams d = 4;
  }
}

message FixtureAParams {}

// G-4 must not walk into the foreign type: BoolValue carries a plain bool
// internally, but imported messages are referenced surface, not ours to
// audit — the subtree closure stops at them.
message FixtureBParams {
  google.protobuf.BoolValue wrapped = 1;
}

// G-4 must flag: plain bool in the registry subtree.
message FixtureBoolParams {
  bool plain_flag = 1;
}

// G-4 must not flag: explicit presence.
message FixtureOptBoolParams {
  optional bool opt_flag = 1;
}

// G-3 must flag: embeds a registry member type directly, bypassing the
// registry — the predecessor's five-copy drift in miniature.
message FixtureDirectEmbed {
  FixtureAParams direct = 1;
}

// G-3 must flag: a second oneof over the registry's member types.
message FixtureSecondOneof {
  oneof dup {
    FixtureAParams a2 = 1;
    FixtureBParams b2 = 2;
  }
}

// G-3 must not flag: embedding the registry itself is the conforming form.
message FixtureConformingEmbed {
  FixtureActionParams params = 1 [(buf.validate.field).required = true];
}

// Enum-bounds liveness: both fields carry SOME rule (so the G-1 want-set
// is untouched); only the first violates the enum-bounds pair.
message FixtureEnumCarrier {
  FixtureGoodEnum untagged_enum = 1 [(buf.validate.field).required = true];
  FixtureGoodEnum tagged_enum = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

enum FixtureBadEnum {
  // G-2 must flag: zero value is not *_UNSPECIFIED.
  FIXTURE_BAD_ENUM_ACTIVE = 0;
  FIXTURE_BAD_ENUM_OTHER = 1;
}

enum FixtureGoodEnum {
  FIXTURE_GOOD_ENUM_UNSPECIFIED = 0;
  FIXTURE_GOOD_ENUM_ON = 1;
}
