// Liveness fixtures for the descriptor-walk guards: every shape here is a
// planted violation or a planted non-violation the guards_test rows pin.
syntax = "proto3";

package powermanage.fixture.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/manchtools/power-manage/contract/archtest/internal/fixturepb/powermanage/fixture/v1;fixturepb";

service FixtureService {
  rpc Do(FixtureRequest) returns (FixtureResponse);
  // G-7 deny-list liveness: a banned RPC name ([WIRE-30] — the sole
  // agent-upgrade path is the signed AGENT_UPDATE action, never a dedicated
  // trigger RPC). Reuses FixtureRequest/FixtureResponse so no NEW message
  // joins the service-reachable set — the G-1/enum-bounds want-sets are
  // untouched; the deny-list RPC scan finds this by name.
  rpc TriggerAgentUpdate(FixtureRequest) returns (FixtureResponse);
  // GUARD-006-3 liveness: this method's request closure plants all three
  // authentication-input field families forbidden on PkiService requests.
  rpc PkiIdentityProbe(FixturePkiIdentityRequest) returns (FixtureResponse);
}

message FixtureRequest {
  // G-1 must flag: reachable boundary field with no validate rules.
  string untagged_name = 1;
  // G-1 must not flag.
  string tagged_id = 2 [(buf.validate.field).string.len = 26];
  // Reachability hop: NestedParams joins the boundary through this field.
  NestedParams nested = 3 [(buf.validate.field).required = true];
  // Foreign well-known type: reachable through this (tagged) field, but its
  // internal fields are not contract surface — the closure must not walk
  // into messages defined outside the audited files.
  google.protobuf.Timestamp stamped_at = 4 [(buf.validate.field).required = true];
  // Reachability hop for the enum-bounds liveness shapes (tagged so the
  // G-1 want-set stays lean).
  FixtureEnumCarrier enum_carrier = 5 [(buf.validate.field).required = true];
  // Reachability hop for the required-oneof credit shapes.
  FixtureFrameCarrier frame_carrier = 6 [(buf.validate.field).required = true];
}

message NestedParams {
  // G-1 must flag THROUGH the closure — a nested message is boundary too.
  string untagged_inner = 1;
}

// G-1 required-oneof credit liveness (PR #19 review): the credit is
// MESSAGE-typed-members-only. credited_member must stay clean (buf lint
// rejects field-level required there; the oneof discriminant is the
// validation, and the member type's own fields stay in the walk), but the
// SCALAR member can and must carry its own rules — the untagged string
// must flag, or the credit fails open for every future scalar frame.
message FixtureFrameCarrier {
  oneof frame {
    option (buf.validate.oneof).required = true;

    string untagged_scalar_choice = 1;
    NestedParams credited_member = 2;
  }
}

message FixtureResponse {
  string tagged_out = 1 [(buf.validate.field).string.min_len = 1];
}

message UnreachableLoose {
  // Declared but not service-reachable: G-1 must NOT flag it.
  string never_flagged = 1;
}

// G-3 liveness: a fixture-local registry analog. Members double as G-4
// shapes: FixtureBoolParams plants the plain state-changing bool, its
// optional sibling plants the conforming form.
message FixtureActionParams {
  oneof params {
    FixtureAParams a = 1;
    FixtureBParams b = 2;
    FixtureBoolParams c = 3;
    FixtureOptBoolParams d = 4;
  }
}

message FixtureAParams {}

// G-4 must not walk into the foreign type: BoolValue carries a plain bool
// internally, but imported messages are referenced surface, not ours to
// audit — the subtree closure stops at them.
message FixtureBParams {
  google.protobuf.BoolValue wrapped = 1;
}

// G-4 must flag: plain bool in the registry subtree.
message FixtureBoolParams {
  bool plain_flag = 1;
}

// G-4 must not flag either form: `optional` and oneof membership both give
// a bool explicit presence.
message FixtureOptBoolParams {
  optional bool opt_flag = 1;
  oneof choice {
    bool oneof_flag = 2;
  }
}

// G-3 must flag: embeds a registry member type directly, bypassing the
// registry — the predecessor's five-copy drift in miniature.
message FixtureDirectEmbed {
  FixtureAParams direct = 1;
}

// G-3 must flag: a second oneof over the registry's member types.
message FixtureSecondOneof {
  oneof dup {
    FixtureAParams a2 = 1;
    FixtureBParams b2 = 2;
  }
}

// G-3 must not flag: embedding the registry itself is the conforming form.
message FixtureConformingEmbed {
  FixtureActionParams params = 1 [(buf.validate.field).required = true];
}

// Enum-bounds liveness: both fields carry SOME rule (so the G-1 want-set
// is untouched); only the first violates the enum-bounds pair.
message FixtureEnumCarrier {
  FixtureGoodEnum untagged_enum = 1 [(buf.validate.field).required = true];
  FixtureGoodEnum tagged_enum = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// AC-9 removal-verb never-check liveness (TestGuard_ManifestNoRemovalVerbs):
// FixtureManifest plants a top-level removal-verb field (removed_ids) beside a
// clean sibling (occurrence_ids); the closure hop (entry) reaches
// FixtureManifestEntry, which plants a removal verb one hop deep
// (tombstone_key) beside a clean sibling (assignment_key). The message is
// deliberately service-UNREACHABLE, so it never perturbs the G-1 / enum-bounds
// / registry want-sets — the removal-verb walk finds it by name, not by
// reachability.
message FixtureManifest {
  repeated string removed_ids = 1 [(buf.validate.field).repeated.items.string.min_len = 1];
  repeated string occurrence_ids = 2 [(buf.validate.field).repeated.items.string.min_len = 1];
  FixtureManifestEntry entry = 3 [(buf.validate.field).required = true];
}

message FixtureManifestEntry {
  string tombstone_key = 1 [(buf.validate.field).string.min_len = 1];
  string assignment_key = 2 [(buf.validate.field).string.min_len = 1];
}

// G-7 deny-list liveness (field-name family): auth_token and params_canonical
// are the two [WIRE-30] banned field names (self-asserted identity token; the
// JSON second-representation of signed content). Planted beside a clean
// sibling. Deliberately service-UNREACHABLE so it never perturbs the G-1 /
// enum-bounds / registry want-sets — the deny-list field scan finds banned
// names by name, across every message, not by reachability. Tagged so a stray
// future reachability change would not add a G-1 violation either.
message FixtureDenyFields {
  string auth_token = 1 [(buf.validate.field).string.min_len = 1];
  string params_canonical = 2 [(buf.validate.field).string.min_len = 1];
  string clean_token = 3 [(buf.validate.field).string.min_len = 1];
}

// G-7 evasion fixture (matcher-grammar family): the camelCase spelling of a
// banned field name. proto3 accepts non-snake field names (this module is
// never linted), so the deny-list matcher must canonicalize case AND
// underscores — a name-only lowercase compare accepts authToken while
// banning auth_token. In its own message: a same-message plant would
// collide with auth_token's JSON name.
message FixtureDenyCamel {
  string authToken = 1 [(buf.validate.field).string.min_len = 1];
}

// GUARD-006-3 liveness: device_id and auth_token are planted on a service
// request, while gateway_id is one request-closure hop away. All carry
// validation rules so this fixture does not perturb the G-1 want-set.
message FixturePkiIdentityRequest {
  string device_id = 1 [(buf.validate.field).string.len = 26];
  string auth_token = 2 [(buf.validate.field).string.min_len = 1];
  FixturePkiIdentityNested identity_nested = 3 [(buf.validate.field).required = true];
  FixturePkiJSONAlias identity_alias = 4 [(buf.validate.field).required = true];
}

message FixturePkiJSONAlias {
  // GUARD-006-3 matcher-grammar fixture: the proto name looks harmless, but
  // its explicit JSON spelling recreates the banned device_id input.
  string claimed_identity = 1 [json_name = "deviceId", (buf.validate.field).string.len = 26];
}

message FixturePkiIdentityNested {
  string gateway_id = 1 [(buf.validate.field).string.len = 26];
}

// The same device/gateway field names remain legitimate outside a PkiService
// request closure: they are addressing fields, not authentication inputs.
message FixtureAddressingFields {
  string device_id = 1 [(buf.validate.field).string.len = 26];
  string gateway_id = 2 [(buf.validate.field).string.len = 26];
}

// G-8 near-copy liveness: an exact structural twin pair — identical
// field-name+type multiset {twin_id: string}. The near-copy walk must flag
// exactly this pair. Service-UNREACHABLE (does not perturb other want-sets);
// the field name (twin_id) is distinct from every other fixture single-field
// message, so no OTHER pair collides.
message FixtureTwinA {
  string twin_id = 1 [(buf.validate.field).string.min_len = 1];
}

message FixtureTwinB {
  string twin_id = 1 [(buf.validate.field).string.min_len = 1];
}

enum FixtureBadEnum {
  // G-2 must flag: zero value is not *_UNSPECIFIED.
  FIXTURE_BAD_ENUM_ACTIVE = 0;
  FIXTURE_BAD_ENUM_OTHER = 1;
  // G-7 deny-list liveness (enum-value family): a reserved-backend token
  // ([WIRE-30] — OpenRC is one of the banned init backends; a value with no
  // implementation behind it is dead contract surface). The deny-list enum
  // scan flags exactly this value; ACTIVE/OTHER/UNSPECIFIED/ON stay clean.
  // Added here (not a third fixture enum) so TestDescwalk_FixtureShapes' enum
  // count stays 2 and the hygiene liveness stays a single flag.
  FIXTURE_BAD_ENUM_BACKEND_OPENRC = 2;
}

enum FixtureGoodEnum {
  FIXTURE_GOOD_ENUM_UNSPECIFIED = 0;
  FIXTURE_GOOD_ENUM_ON = 1;
}
