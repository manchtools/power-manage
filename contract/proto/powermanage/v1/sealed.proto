// The uniform sealed-secret transport shape (SPEC-003 §3.7, [WIRE-23..25],
// SEC-11 SPEC-015).
//
// Secrets cross the gateway ONLY as sealed blobs — device-originated (LPS
// passwords, LUKS passphrases, USER temp passwords) sealed to control's
// X25519 key, and control-originated inline action-field secrets sealed to
// the device's enrollment-registered X25519 key. The seal/open crypto
// (X25519 + HKDF-SHA256 + AES-256-GCM) lives EXCLUSIVELY in sdk (SDK-13,
// SPEC-004); this file fixes only the message shape, and contract/seal
// carries the mandated info-string constants.
syntax = "proto3";

package powermanage.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/manchtools/power-manage/contract/gen/go/powermanage/v1;powermanagev1";

message SealedBlob {
  // AEAD output; never empty ([WIRE-25] symmetric empty-input rejection).
  bytes ciphertext = 1 [(buf.validate.field).bytes.min_len = 1];
  // X25519 ephemeral public key — exactly 32 bytes.
  bytes ephemeral_public_key = 2 [(buf.validate.field).bytes.len = 32];
  // The mandated HKDF domain-info string — closed set, mirrored by the
  // contract/seal Go constants; an unregistered sealing domain fails at
  // the boundary ([WIRE-23]).
  string info = 3 [(buf.validate.field).string = {
    in: [
      "power-manage-lps-password:v1",
      "power-manage-luks-passphrase:v1",
      "power-manage-action-field-secret:v1"
    ]
  }];
  // Mandatory context binding (device|action|username or device|action or
  // device|action|field) — an empty context is unbound sealing ([WIRE-23]).
  string context = 4 [(buf.validate.field).string.min_len = 1];
}
