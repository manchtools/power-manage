// ControlService (SPEC-003 §3.2): full management API for the web UI and
// CLI over HTTPS + JWT on :8081. RPCs land per milestone; an empty service
// is the M1 scaffold, not surface.
syntax = "proto3";

package powermanage.v1;

import "buf/validate/validate.proto";
import "powermanage/v1/common.proto";
import "powermanage/v1/management.proto";

option go_package = "github.com/manchtools/power-manage/contract/gen/go/powermanage/v1;powermanagev1";

service ControlService {
  rpc RefreshSession(RefreshSessionRequest) returns (RefreshSessionResponse);
  rpc StartOidcSession(StartOidcSessionRequest) returns (StartOidcSessionResponse);
  rpc CompleteOidcSession(CompleteOidcSessionRequest) returns (CompleteOidcSessionResponse);
  rpc CreateDeviceGroup(CreateDeviceGroupRequest) returns (CreateDeviceGroupResponse);
  rpc GetDeviceGroup(GetDeviceGroupRequest) returns (GetDeviceGroupResponse);
  rpc ListDeviceGroups(ListDeviceGroupsRequest) returns (ListDeviceGroupsResponse);
  rpc UpdateDeviceGroup(UpdateDeviceGroupRequest) returns (UpdateDeviceGroupResponse);
  rpc DeleteDeviceGroup(DeleteDeviceGroupRequest) returns (DeleteDeviceGroupResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc CreateGrant(CreateGrantRequest) returns (CreateGrantResponse);
  rpc GetGrant(GetGrantRequest) returns (GetGrantResponse);
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse);
  rpc UpdateGrant(UpdateGrantRequest) returns (UpdateGrantResponse);
  rpc DeleteGrant(DeleteGrantRequest) returns (DeleteGrantResponse);
  rpc CreateUserGroup(CreateUserGroupRequest) returns (CreateUserGroupResponse);
  rpc GetUserGroup(GetUserGroupRequest) returns (GetUserGroupResponse);
  rpc ListUserGroups(ListUserGroupsRequest) returns (ListUserGroupsResponse);
  rpc UpdateUserGroup(UpdateUserGroupRequest) returns (UpdateUserGroupResponse);
  rpc DeleteUserGroup(DeleteUserGroupRequest) returns (DeleteUserGroupResponse);
  rpc GetDevice(GetDeviceRequest) returns (GetDeviceResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc UpdateDevice(UpdateDeviceRequest) returns (UpdateDeviceResponse);
  rpc DeleteDevice(DeleteDeviceRequest) returns (DeleteDeviceResponse);
  rpc CreateRegistrationToken(CreateRegistrationTokenRequest) returns (CreateRegistrationTokenResponse);
  rpc GetRegistrationToken(GetRegistrationTokenRequest) returns (GetRegistrationTokenResponse);
  rpc ListRegistrationTokens(ListRegistrationTokensRequest) returns (ListRegistrationTokensResponse);
  rpc UpdateRegistrationToken(UpdateRegistrationTokenRequest) returns (UpdateRegistrationTokenResponse);
  rpc DeleteRegistrationToken(DeleteRegistrationTokenRequest) returns (DeleteRegistrationTokenResponse);
  rpc CreateApiToken(CreateApiTokenRequest) returns (CreateApiTokenResponse);
  rpc GetApiToken(GetApiTokenRequest) returns (GetApiTokenResponse);
  rpc ListApiTokens(ListApiTokensRequest) returns (ListApiTokensResponse);
  rpc UpdateApiToken(UpdateApiTokenRequest) returns (UpdateApiTokenResponse);
  rpc DeleteApiToken(DeleteApiTokenRequest) returns (DeleteApiTokenResponse);
  rpc CreateIdentityProvider(CreateIdentityProviderRequest) returns (CreateIdentityProviderResponse);
  rpc GetIdentityProvider(GetIdentityProviderRequest) returns (GetIdentityProviderResponse);
  rpc ListIdentityProviders(ListIdentityProvidersRequest) returns (ListIdentityProvidersResponse);
  rpc UpdateIdentityProvider(UpdateIdentityProviderRequest) returns (UpdateIdentityProviderResponse);
  rpc DeleteIdentityProvider(DeleteIdentityProviderRequest) returns (DeleteIdentityProviderResponse);
  rpc CreateScimConfiguration(CreateScimConfigurationRequest) returns (CreateScimConfigurationResponse);
  rpc GetScimConfiguration(GetScimConfigurationRequest) returns (GetScimConfigurationResponse);
  rpc ListScimConfigurations(ListScimConfigurationsRequest) returns (ListScimConfigurationsResponse);
  rpc UpdateScimConfiguration(UpdateScimConfigurationRequest) returns (UpdateScimConfigurationResponse);
  rpc DeleteScimConfiguration(DeleteScimConfigurationRequest) returns (DeleteScimConfigurationResponse);
  rpc CreateServerSetting(CreateServerSettingRequest) returns (CreateServerSettingResponse);
  rpc GetServerSetting(GetServerSettingRequest) returns (GetServerSettingResponse);
  rpc ListServerSettings(ListServerSettingsRequest) returns (ListServerSettingsResponse);
  rpc UpdateServerSetting(UpdateServerSettingRequest) returns (UpdateServerSettingResponse);
  rpc DeleteServerSetting(DeleteServerSettingRequest) returns (DeleteServerSettingResponse);
  rpc CreateAction(CreateActionRequest) returns (CreateActionResponse);
  rpc GetAction(GetActionRequest) returns (GetActionResponse);
  rpc ListActions(ListActionsRequest) returns (ListActionsResponse);
  rpc UpdateAction(UpdateActionRequest) returns (UpdateActionResponse);
  rpc DeleteAction(DeleteActionRequest) returns (DeleteActionResponse);
  rpc CreateActionSet(CreateActionSetRequest) returns (CreateActionSetResponse);
  rpc GetActionSet(GetActionSetRequest) returns (GetActionSetResponse);
  rpc ListActionSets(ListActionSetsRequest) returns (ListActionSetsResponse);
  rpc UpdateActionSet(UpdateActionSetRequest) returns (UpdateActionSetResponse);
  rpc DeleteActionSet(DeleteActionSetRequest) returns (DeleteActionSetResponse);
  rpc CreateAssignment(CreateAssignmentRequest) returns (CreateAssignmentResponse);
  rpc GetAssignment(GetAssignmentRequest) returns (GetAssignmentResponse);
  rpc ListAssignments(ListAssignmentsRequest) returns (ListAssignmentsResponse);
  rpc DeleteAssignment(DeleteAssignmentRequest) returns (DeleteAssignmentResponse);
  rpc CreateCompliancePolicy(CreateCompliancePolicyRequest) returns (CreateCompliancePolicyResponse);
  rpc GetCompliancePolicy(GetCompliancePolicyRequest) returns (GetCompliancePolicyResponse);
  rpc ListCompliancePolicies(ListCompliancePoliciesRequest) returns (ListCompliancePoliciesResponse);
  rpc UpdateCompliancePolicy(UpdateCompliancePolicyRequest) returns (UpdateCompliancePolicyResponse);
  rpc DeleteCompliancePolicy(DeleteCompliancePolicyRequest) returns (DeleteCompliancePolicyResponse);
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc GetExecution(GetExecutionRequest) returns (GetExecutionResponse);
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
  rpc GetInventorySnapshot(GetInventorySnapshotRequest) returns (GetInventorySnapshotResponse);
  rpc ListInventorySnapshots(ListInventorySnapshotsRequest) returns (ListInventorySnapshotsResponse);
  rpc GetGateway(GetGatewayRequest) returns (GetGatewayResponse);
  rpc ListGateways(ListGatewaysRequest) returns (ListGatewaysResponse);
}

message RefreshSessionRequest {
  string refresh_token = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
}

message RefreshSessionResponse {
  string access_token = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
  string refresh_token = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
}

message StartOidcSessionRequest {
  string provider_slug = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
    pattern: "^[a-z][a-z0-9-]*$"
  }];
  string redirect_uri = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2048
  }];
}

message StartOidcSessionResponse {
  string authorization_url = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
}

message CompleteOidcSessionRequest {
  string state = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
  string code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 4096
  }];
}

message CompleteOidcSessionResponse {
  string access_token = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
  string refresh_token = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8192
  }];
}

message DeviceGroup {
  string id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string dynamic_query = 3 [(buf.validate.field).string.max_len = 4096];
  uint64 version = 4 [(buf.validate.field).uint64 = {
    gte: 1
    lte: 9223372036854775807
  }];
  repeated string static_device_ids = 5 [(buf.validate.field).repeated = {
    max_items: 1000
    unique: true
    items: {
      string: {
        pattern: "^[0-7][0-9A-HJKMNP-TV-Z]{25}$"
      }
    }
  }];
}

message CreateDeviceGroupRequest {
  string id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string dynamic_query = 3 [(buf.validate.field).string.max_len = 4096];
  repeated string static_device_ids = 4 [(buf.validate.field).repeated = {
    max_items: 1000
    unique: true
    items: {
      string: {
        pattern: "^[0-7][0-9A-HJKMNP-TV-Z]{25}$"
      }
    }
  }];
}

message GetDeviceGroupRequest {
  string id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
}

message CreateDeviceGroupResponse {
  DeviceGroup device_group = 1 [(buf.validate.field).required = true];
}

message GetDeviceGroupResponse {
  DeviceGroup device_group = 1 [(buf.validate.field).required = true];
}

message ListDeviceGroupsRequest {
  uint32 limit = 1 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 200
  }];
}

message ListDeviceGroupsResponse {
  repeated DeviceGroup device_groups = 1 [(buf.validate.field).repeated = {
    max_items: 200
  }];
}

message UpdateDeviceGroupRequest {
  string id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string dynamic_query = 3 [(buf.validate.field).string.max_len = 4096];
  uint64 expected_version = 4 [(buf.validate.field).uint64 = {
    gte: 1
    lte: 9223372036854775807
  }];
  repeated string static_device_ids = 5 [(buf.validate.field).repeated = {
    max_items: 1000
    unique: true
    items: {
      string: {
        pattern: "^[0-7][0-9A-HJKMNP-TV-Z]{25}$"
      }
    }
  }];
}

message UpdateDeviceGroupResponse {
  DeviceGroup device_group = 1 [(buf.validate.field).required = true];
}

message DeleteDeviceGroupRequest {
  string id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
  uint64 expected_version = 2 [(buf.validate.field).uint64 = {
    gte: 1
    lte: 9223372036854775807
  }];
}

message DeleteDeviceGroupResponse {
  string deleted_id = 1 [(buf.validate.field).string.(powermanage.v1.ulid) = true];
}
