// Artifact-fetch stream frames (SPEC-003 §3.9, [WIRE-28/29], AC-10).
//
// ONE definition shared by both streams ([WIRE-1]): AgentFrame/ServerFrame
// carry these directly; the internal stream wraps them in the *Relay
// addressing messages (internal.proto). Chunks carry no per-chunk
// signatures: integrity is the agent's whole-artifact digest check against
// the (sha256, size) reference covered by the SignedCommand signature
// ([WIRE-29]; ART-2, SPEC-010). The relay is stateless — the CRL stays the
// only gateway-cached artifact (TM-2).
syntax = "proto3";

package powermanage.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/manchtools/power-manage/contract/gen/go/powermanage/v1;powermanagev1";

// The two unservable causes [WIRE-28] names — unknown digest and
// garbage-collected blob. Static answers per [WIRE-7]: the code is the
// whole message; a third cause lands only with its implementation.
enum ArtifactFetchErrorCode {
  ARTIFACT_FETCH_ERROR_CODE_UNSPECIFIED = 0;
  ARTIFACT_FETCH_ERROR_CODE_UNKNOWN_DIGEST = 1;
  ARTIFACT_FETCH_ERROR_CODE_GONE = 2;
}

// Agent→gateway(→control) fetch by digest. offset supports resume after
// interruption and is deliberately unconstrained: the full uint64 range is
// legal resume input; the bound is the artifact's size, enforced
// server-side (ART-2, SPEC-010) — a tag here would over-constrain
// legitimate resume ([WIRE-2]).
message ArtifactFetchRequest {
  string sha256 = 1 [(buf.validate.field).string.pattern = "^[a-f0-9]{64}$"];
  uint64 offset = 2;
}

// Control(→gateway)→agent chunked bytes for a named connected device.
// Never a zero-length success: completion is the agent's (sha256, size)
// reference from the signed command, not an empty chunk ([WIRE-28]).
message ArtifactChunk {
  string sha256 = 1 [(buf.validate.field).string.pattern = "^[a-f0-9]{64}$"];
  uint64 offset = 2;
  bytes data = 3 [(buf.validate.field).bytes.min_len = 1];
}

// Structured refusal for an unservable fetch — never silence ([WIRE-28]).
message ArtifactFetchError {
  string sha256 = 1 [(buf.validate.field).string.pattern = "^[a-f0-9]{64}$"];
  ArtifactFetchErrorCode code = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}
