// PkiService (SPEC-003 §3.2): the single enrollment/renewal/revocation
// surface on :8083 (server-auth TLS; authorization is per-operation, not
// per-transport — PKI-1a, SPEC-006).
syntax = "proto3";

package powermanage.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/manchtools/power-manage/contract/gen/go/powermanage/v1;powermanagev1";

service PkiService {
  rpc EnrollAgent(EnrollAgentRequest) returns (EnrollAgentResponse);
  rpc RenewAgent(RenewAgentRequest) returns (RenewAgentResponse);
  rpc RevokeAgent(RevokeAgentRequest) returns (RevokeAgentResponse);
  rpc ForceRenewAgent(ForceRenewAgentRequest) returns (ForceRenewAgentResponse);
  rpc EnrollGateway(EnrollGatewayRequest) returns (EnrollGatewayResponse);
  rpc RenewGateway(RenewGatewayRequest) returns (RenewGatewayResponse);
  rpc RevokeGateway(RevokeGatewayRequest) returns (RevokeGatewayResponse);
  rpc ConfirmAgentTrustState(ConfirmTrustStateRequest) returns (ConfirmTrustStateResponse);
  rpc ConfirmGatewayTrustState(ConfirmTrustStateRequest) returns (ConfirmTrustStateResponse);
}

// CATrustBundle is the exact desired trust state for one certificate class.
// Roots are canonical current+successor during overlap and are never inferred
// from a coarse rotation phase.
message CATrustBundle {
  uint64 generation = 1 [(buf.validate.field).uint64.gte = 1];
  uint64 revision = 2 [(buf.validate.field).uint64.gte = 1];
  repeated bytes root_certificate_der = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 2
    items: {
      bytes: {
        min_len: 1
        max_len: 65536
      }
    }
  }];
  bytes transition_certificate_der = 4 [(buf.validate.field).bytes.max_len = 65536];
  // Agent-root bundles carry the issuer-scoped CRL state that a gateway must
  // have adopted before confirming this exact trust publication. Gateway-root
  // bundles leave both fields unset.
  bytes crl_issuer_fingerprint = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).bytes.len = 32
  ];
  uint64 crl_sequence = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).uint64.gte = 1
  ];
}

// ConfirmTrustStateRequest carries one independently applicable signed class
// claim. Reporter class is derived from the procedure, never caller supplied.
message ConfirmTrustStateRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  string claimed_class = 2 [(buf.validate.field).string = {
    in: ["agent", "gateway"]
  }];
  uint64 generation = 3 [(buf.validate.field).uint64.gte = 1];
  uint64 revision = 4 [(buf.validate.field).uint64.gte = 1];
  repeated bytes root_fingerprints = 5 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 2
    items: {
      bytes: {len: 32}
    }
  }];
  bytes crl_issuer_fingerprint = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).bytes.len = 32
  ];
  uint64 crl_sequence = 7 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).uint64.gte = 1
  ];
  bytes signature = 8 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 8192
  }];
}

message ConfirmTrustStateResponse {}

// EnrollAgentRequest carries proof generated entirely on the device. The
// registration token is the sole authorization; no claimed device identity is
// accepted from the caller.
message EnrollAgentRequest {
  // The token grammar is deliberately checked by the constant-time admission
  // service so malformed and unknown tokens share one rejection path.
  string registration_token = 1 [(buf.validate.field).string.max_len = 512];
  bytes certificate_signing_request_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes sealing_public_key = 3 [(buf.validate.field).bytes.len = 32];
}

// EnrollAgentResponse returns public material only. The private mTLS and
// sealing keys remain on the device that generated the request.
message EnrollAgentResponse {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_authority_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes gateway_certificate_authority_der = 3 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  CATrustBundle agent_trust_bundle = 4 [(buf.validate.field).required = true];
  CATrustBundle gateway_trust_bundle = 5 [(buf.validate.field).required = true];
}

// RenewAgentRequest proves continuity from the current exact certificate to a
// CSR signed by the same device-held key. Control derives device identity from
// the certificate; no caller-asserted identity field exists.
message RenewAgentRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_signing_request_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes sealing_public_key = 3 [(buf.validate.field).bytes.len = 32];
}

// RenewAgentResponse returns public replacement material only. Device private
// keys remain local and the enrolled CA remains the trust anchor.
message RenewAgentResponse {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_authority_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes gateway_certificate_authority_der = 3 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  CATrustBundle agent_trust_bundle = 4 [(buf.validate.field).required = true];
  CATrustBundle gateway_trust_bundle = 5 [(buf.validate.field).required = true];
}

// RevokeAgentRequest identifies the currently stored certificate exactly.
// Operator authorization is transport metadata, never a protobuf identity
// claim. Control derives the device identity from this certificate.
message RevokeAgentRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
}

// ForceRenewAgentRequest identifies the currently stored certificate exactly.
// It remains distinct because this operation may gain renewal policy without
// changing terminal revocation.
message ForceRenewAgentRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
}

message RevokeAgentResponse {}

message ForceRenewAgentResponse {}

// EnrollGatewayRequest carries only the gateway-held proof and a
// gateway-purpose token. DNS identity is control-owned token metadata.
message EnrollGatewayRequest {
  string registration_token = 1 [(buf.validate.field).string.max_len = 512];
  bytes certificate_signing_request_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
}

message EnrollGatewayResponse {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_authority_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  CATrustBundle agent_trust_bundle = 3 [(buf.validate.field).required = true];
  CATrustBundle gateway_trust_bundle = 4 [(buf.validate.field).required = true];
}

// RenewGatewayRequest proves continuity from the exact current certificate
// to a CSR signed by the same in-memory gateway key.
message RenewGatewayRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_signing_request_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
}

message RenewGatewayResponse {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  bytes certificate_authority_der = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
  CATrustBundle agent_trust_bundle = 3 [(buf.validate.field).required = true];
  CATrustBundle gateway_trust_bundle = 4 [(buf.validate.field).required = true];
}

// RevokeGatewayRequest identifies the exact currently stored gateway
// certificate. Operator authorization remains transport metadata.
message RevokeGatewayRequest {
  bytes certificate_der = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 65536
  }];
}

message RevokeGatewayResponse {}
