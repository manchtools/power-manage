version: v2
modules:
  - path: proto
deps:
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - STANDARD
  # The bidi stream frame envelopes carry their spec-pinned names —
  # AgentFrame/ServerFrame (§3.2, SPEC-003) and GatewayFrame/ControlFrame
  # (GW-3 table, SPEC-012) — not the Buf <Rpc>Request/<Rpc>Response
  # convention. The PKI trust-state procedures deliberately share one
  # request/response because the procedure supplies reporter class.
  # ignore_only is file-granular, so conforming RPCs in these files are also
  # exempted — backstopped by exact-set descriptor guards.
  ignore_only:
    RPC_REQUEST_STANDARD_NAME:
      - proto/powermanage/v1/agent.proto
      - proto/powermanage/v1/internal.proto
      # Trust-state confirmations intentionally share one caller-class-free
      # message; the selected PKI procedure is the reporter-class authority.
      - proto/powermanage/v1/pki.proto
    RPC_RESPONSE_STANDARD_NAME:
      - proto/powermanage/v1/agent.proto
      - proto/powermanage/v1/internal.proto
      - proto/powermanage/v1/pki.proto
    RPC_REQUEST_RESPONSE_UNIQUE:
      - proto/powermanage/v1/pki.proto
# No breaking gate: proto evolution re-tags in place with no reserved
# markers (AC-13, SPEC-003; recorded decision) — exactly what a
# breaking-change gate would reject.
