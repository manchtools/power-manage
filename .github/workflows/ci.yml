name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

jobs:
  self-contained:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Self-contained repo check
        run: ./scripts/check-self-contained.sh

  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # the lint walks the pushed/PR commit range
      - name: Tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/check-conventions.sh tag "${GITHUB_REF#refs/tags/}"
      - name: Commit lint + attribution
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/check-conventions.sh ci-commits "$BASE" "$HEAD_SHA"
      - name: PR body attribution
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr-body.txt" && ./scripts/check-conventions.sh pr-body-file "$RUNNER_TEMP/pr-body.txt"

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@latest
      - name: Verify
        run: ./scripts/verify.sh
