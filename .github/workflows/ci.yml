name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-contained:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Self-contained repo check
        run: ./scripts/check-self-contained.sh

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # buf breaking compares against origin/main
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@latest
      - name: Verify
        run: ./scripts/verify.sh
