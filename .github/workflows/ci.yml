name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

jobs:
  self-contained:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Self-contained repo check
        run: ./scripts/check-self-contained.sh

  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # the lint walks the pushed/PR commit range
      - name: Tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/check-conventions.sh tag "${GITHUB_REF#refs/tags/}"
      - name: Commit lint + attribution
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/check-conventions.sh ci-commits "$BASE" "$HEAD_SHA"
      - name: PR body attribution
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr-body.txt" && ./scripts/check-conventions.sh pr-body-file "$RUNNER_TEMP/pr-body.txt"

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.66.1
      - name: Install docref
        env:
          DOCREF_VERSION: v0.1.0
        run: |
          curl -fsSL "https://github.com/manchtools/open-docref/releases/download/${DOCREF_VERSION}/docref-linux-x64" -o "$RUNNER_TEMP/docref-linux-x64"
          curl -fsSL "https://github.com/manchtools/open-docref/releases/download/${DOCREF_VERSION}/SHA256SUMS" -o "$RUNNER_TEMP/SHA256SUMS"
          (cd "$RUNNER_TEMP" && grep '  docref-linux-x64$' SHA256SUMS | sha256sum -c -)
          install -m 0755 "$RUNNER_TEMP/docref-linux-x64" "$RUNNER_TEMP/docref"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Verify
        run: ./scripts/verify.sh

  # The direct fsafe backend IS root in production; its positive create paths
  # (e.g. Mkdir producing a 0750 dir under a root-owned parent) require a
  # root-owned parent, so they t.Skip on the non-root `verify` lane above — a
  # non-root runner cannot own that parent. Run the fsafe suite as root here so
  # that positive coverage is exercised. Refusal tests use world-writable
  # parents, so they still refuse at uid 0 (the write bits, not just ownership).
  fsafe-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          # No caching: this monorepo has no root go.mod, so setup-go cannot key
          # the cache (it warns "Dependencies file is not found" and saves
          # nothing). Leaving it on would also risk a post-job "permission denied"
          # the moment keying ever succeeds, since `sudo -E` runs go test as root
          # and the caches ($HOME/.cache/go-build, $HOME/go/pkg/mod) would fill
          # with root-owned files the runner-user save step cannot archive.
          cache: false
      - name: Direct-backend fsafe tests as root
        run: sudo -E env "PATH=$PATH" go test -C sdk ./fsafe/ -count=1
